<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Venta de Agua</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      margin: 3px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-eliminar {
      background: red;
    }

    .btn-entregado {
      background: green;
    }

    .estado-pendiente {
      color: orange;
      font-weight: bold;
    }

    .estado-entregado {
      color: green;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #0d6efd;
      color: white;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0d6efd;
      color: white;
      padding: 15px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.3s;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<header>
  <h1>💧 Panel de Administración</h1>
</header>

<div class="container">

  <div class="card">
    <h2>📊 Resumen</h2>
    <p>Pedidos: <span id="totalPedidos">0</span></p>
    <p>Ganancia: $<span id="ganancia">0</span></p>
  </div>

  <div class="card">
    <h2>📦 Pedidos</h2>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Dirección</th>
          <th>Bidones</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaPedidos"></tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<script>

const URL = "";
const PRECIO = 3500;

// TOAST
function mostrarMensaje(texto){
  let t = document.getElementById("toast");
  t.innerText = texto;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

// CARGAR PEDIDOS
function cargarPedidos(){
  fetch(URL + "/pedidos")
  .then(r => r.json())
  .then(data => {

    let tabla = document.getElementById("tablaPedidos");
    tabla.innerHTML = "";

    let total = 0;
    let ganancia = 0;

    data.forEach(p => {

      total++;
      ganancia += p.bidones * PRECIO;

      let claseEstado = p.estado === "entregado" 
        ? "estado-entregado" 
        : "estado-pendiente";

      let textoEstado = p.estado === "entregado" 
        ? "✔ ENTREGADO" 
        : "⏳ PENDIENTE";

      tabla.innerHTML += `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.direccion}</td>
          <td>${p.bidones}</td>
          <td class="${claseEstado}">${textoEstado}</td>
          <td>
            ${
              p.estado === "pendiente"
              ? `<button onclick="entregar(${p.id})" class="btn-entregado">Entregado</button>`
              : ``
            }
            <button onclick="eliminar(${p.id})" class="btn-eliminar">Eliminar</button>
          </td>
        </tr>
      `;
    });

    document.getElementById("totalPedidos").innerText = total;
    document.getElementById("ganancia").innerText = ganancia;

  });
}

// ELIMINAR
function eliminar(id){
  console.log("CLICK ELIMINAR", id);

  fetch(URL + "/pedido/" + id, { method: "DELETE" })
  .then(() => {
    mostrarMensaje("🗑️ Eliminado");
    cargarPedidos();
  });
}

// ENTREGADO
function entregar(id){
  console.log("CLICK EN BOTON", id);

  fetch("http://localhost:3000/pedido/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ estado: "entregado" })
  })
  .then(res => {
    console.log("STATUS:", res.status);
    return res.text(); // 🔥 cambiamos esto
  })
  .then(data => {
    console.log("RESPUESTA:", data);
    mostrarMensaje("✅ Pedido entregado");
    cargarPedidos();
  })
  .catch(err => {
    console.error("ERROR:", err);
  });
}
cargarPedidos()
</script>

</body>
</html>
